name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Run tests
        run: yarn test

      - name: Publish @os-legal/caml
        working-directory: packages/caml
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@os-legal/caml@$VERSION" version 2>/dev/null; then
            echo "v$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @os-legal/caml-react
        working-directory: packages/caml-react
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@os-legal/caml-react@$VERSION" version 2>/dev/null; then
            echo "v$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi
