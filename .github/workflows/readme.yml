name: Regenerate README Assets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Install Playwright browsers
        working-directory: packages/caml-react
        run: npx playwright install --with-deps chromium

      - name: Start Storybook
        working-directory: packages/caml-react
        run: npx storybook dev -p 6006 --no-open &

      - name: Wait for Storybook
        run: npx wait-on http://localhost:6006 --timeout 30000

      - name: Generate README assets
        run: node scripts/generate-readme-assets.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/
          git diff --staged --quiet || git commit -m "Auto-update README screenshot" && git push
